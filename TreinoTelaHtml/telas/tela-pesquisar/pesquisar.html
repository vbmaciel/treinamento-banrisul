<div id="pesquisar-cliente">
<form id="formulario-pesquisa">
    <div class="pesquisa-cliente">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" placeholder="Nome do Cliente">
    </div>

    <button class="pesquisa-cliente" type="submit">Pesquisar</button>
</form>

<div id="tabela">
<table id="tabela-pesquisa">
  <thead>
    <tr>
      <th>Nome</th>
      <th>Idade</th>
      <th>Tipo Conta</th>
      <th>Valor</th>
    </tr>
  </thead>
  <tbody id="corpo">
    <!-- Os dados do formulário vão entrar aqui dinamicamente -->
  </tbody>
</table>
</div>
</div>
