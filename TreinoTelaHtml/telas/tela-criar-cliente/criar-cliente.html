
<form id="formulario">
    <div class="entradas">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" placeholder="Seu nome">
    </div>
    <div class="entradas">
        <label for="idade">Idade</label>
        <input type="text" id="idade" name="idade" placeholder="Sua Idade">
    </div>
    
    <div class="entradas">
        <label for="tipo-conta">Conta</label>
        <input type="text" id="tipo-conta" name="tipo-conta" placeholder="Tipo de Conta">
    </div>
    
    <div class="entradas">
        <label for="valor-depositar">Valor</label>
        <input type="text" id="valor-depositar" name="valor-depositar" placeholder="Valor a Depositar">
    </div>
    
    <button class="entradas" type="submit">Enviar</button>
</form>
