<div id="tela-login">
    <form id="menu">
        <h1 id="titulo-login">Faça o seu login</h1>
        <div class="campo-input">
            <label for="email">Seu E-mail*</label>
            <input type="text" id="email">
        </div>
        
        <div class="campo-input">
            <label for="senha">Sua Senha*</label>
            <input type="password" id="senha">
        </div>
        
        <div id="lembrar">
            <input type="checkbox" id="lembrar" name="opcao" value="valor">
            <label for="lembrar">Lembrar-me</label>
        </div>
        
        <button id="entrar" type="button">Entrar</button> 
        <p class="esqueceu-senha">
            Esqueceu sua senha?
            <a href="https://www.google.com">Clique aqui!</a>
        </p>
    </form>
</div>
